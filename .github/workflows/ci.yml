name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.3"
  PROTOC_VERSION: "35.0"
  PROTOC_GEN_GO_VERSION: "v1.36.11"
  PROTOC_GEN_GO_GRPC_VERSION: "v1.6.2"

jobs:
  quality:
    name: Quality and integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gophkeeper_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gophkeeper_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      GOPHKEEPER_TEST_DATABASE_DSN: postgres://postgres:postgres@127.0.0.1:5432/gophkeeper_test?sslmode=disable

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install protoc
        shell: bash
        run: |
          set -euo pipefail
          archive="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          curl --fail --location --silent --show-error \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${archive}" \
            --output "${RUNNER_TEMP}/${archive}"
          unzip -q "${RUNNER_TEMP}/${archive}" -d "${RUNNER_TEMP}/protoc"
          echo "${RUNNER_TEMP}/protoc/bin" >> "${GITHUB_PATH}"

      - name: Install pinned protobuf generators
        shell: bash
        run: |
          set -euo pipefail
          go install "google.golang.org/protobuf/cmd/protoc-gen-go@${PROTOC_GEN_GO_VERSION}"
          go install "google.golang.org/grpc/cmd/protoc-gen-go-grpc@${PROTOC_GEN_GO_GRPC_VERSION}"

      - name: Verify generated protobuf files
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/generate-proto.sh
          git diff --exit-code -- api/gophkeeper/v1

      - name: Verify formatting
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          if [ -n "${files}" ]; then
            printf 'The following files are not formatted:\n%s\n' "${files}" >&2
            exit 1
          fi

      - name: Verify module files
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run vet
        run: go vet ./...

      - name: Run tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          packages="$(go list ./... | grep -v '/api/gophkeeper/v1$')"
          go test -count=1 -covermode=atomic -coverprofile=coverage.out ${packages}
          go tool cover -func=coverage.out | tail -n 1

      - name: Upload coverage profile
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

  race:
    name: Race detector
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run race detector
        run: go test -count=1 -race ./...

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-24.04
            extension: ""
          - name: windows-amd64
            runner: windows-2025
            extension: .exe
          - name: macos-arm64
            runner: macos-15
            extension: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build client and server
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          version="dev"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          fi

          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          commit="$(git rev-parse --short=12 HEAD)"
          module="github.com/sastromikus/gophkeeper"
          ldflags="-s -w -X ${module}/internal/version.Version=${version} -X ${module}/internal/version.BuildDate=${build_date} -X ${module}/internal/version.Commit=${commit}"

          go build -trimpath -ldflags "${ldflags}" \
            -o "dist/gophkeeper-client-${{ matrix.name }}${{ matrix.extension }}" ./cmd/client
          go build -trimpath -ldflags "${ldflags}" \
            -o "dist/gophkeeper-server-${{ matrix.name }}${{ matrix.extension }}" ./cmd/server

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gophkeeper-${{ matrix.name }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
