name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: 1.26.3
  PROTOC_VERSION: 35.0
  PROTOC_GEN_GO_VERSION: v1.36.11
  PROTOC_GEN_GO_GRPC_VERSION: v1.6.2
  GOPHKEEPER_TEST_DATABASE_DSN: postgres://postgres:postgres@127.0.0.1:5432/gophkeeper_test?sslmode=disable

jobs:
  quality:
    name: Test, vet, race, and coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gophkeeper_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gophkeeper_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install protoc
        shell: bash
        run: |
          set -euo pipefail
          archive="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          curl --fail --location --silent --show-error \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${archive}" \
            --output "/tmp/${archive}"
          unzip -q "/tmp/${archive}" -d "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install protobuf generators
        shell: bash
        run: |
          set -euo pipefail
          go install "google.golang.org/protobuf/cmd/protoc-gen-go@${PROTOC_GEN_GO_VERSION}"
          go install "google.golang.org/grpc/cmd/protoc-gen-go-grpc@${PROTOC_GEN_GO_GRPC_VERSION}"

      - name: Verify generated code and formatting
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/generate-proto.sh
          gofmt -w .
          go mod tidy
          git diff --exit-code

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -count=1 ./...

      - name: Run race detector
        run: go test -count=1 -race ./...

      - name: Calculate handwritten-code coverage
        shell: bash
        run: ./scripts/coverage.sh coverage.out

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            suffix: ""
          - target: windows-amd64
            goos: windows
            goarch: amd64
            suffix: .exe
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            suffix: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build client and server
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          version="$(git describe --tags --always --dirty)"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w \
            -X github.com/sastromikus/gophkeeper/internal/version.Version=${version} \
            -X github.com/sastromikus/gophkeeper/internal/version.BuildDate=${build_date} \
            -X github.com/sastromikus/gophkeeper/internal/version.Commit=${commit}"

          mkdir -p dist
          go build -trimpath -ldflags "$ldflags" \
            -o "dist/gophkeeper-client-${{ matrix.target }}${{ matrix.suffix }}" ./cmd/client
          go build -trimpath -ldflags "$ldflags" \
            -o "dist/gophkeeper-server-${{ matrix.target }}${{ matrix.suffix }}" ./cmd/server

      - name: Upload binaries
        uses: actions/upload-artifact@v4.6.2
        with:
          name: gophkeeper-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
